<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrizAHP - Índice de Maturidade Municipal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 500px;
    }
    h1 { color: #333; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a {
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-block;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 MatrizAHP</h1>
    <p>Índice de Maturidade Municipal - Análise Hierárquica (AHP)</p>

    <div class="links">
      <a href="/admin/dashboard.html" class="btn-primary">📊 Admin Dashboard</a>
      <a href="/assessment/questionario-municipal.html" class="btn-secondary">📝 Questionário Municipal</a>
      <a href="/calibracao/ahp-express.html" class="btn-secondary">⚙️ Calibração AHP</a>
    </div>
  </div>
</body>
</html>
