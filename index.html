<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Índice de Maturidade Municipal</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --text: #111827;
      --text-sec: #6b7280;
      --border: #d1d5db;
      --surface: #f9fafb;
      --white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      max-width: 480px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 48px 32px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      background: #eff6ff;
      border-radius: 4px;
      padding: 4px 12px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: var(--text-sec);
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    a {
      padding: 12px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      display: block;
      border: 1px solid var(--border);
    }
    a:hover {
      border-color: var(--primary);
      background: #eff6ff;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Sistema de Avaliação</span>
    <h1>Índice de Maturidade</h1>
    <p>Índice de Maturidade Municipal - Análise Hierárquica Processual (AHP)</p>

    <div class="links">
      <a href="/assessment/questionario-municipal.html">Questionário Municipal</a>
      <a href="/calibracao/ahp-express.html">Calibração de Pesos</a>
    </div>
  </div>
</body>
</html>
