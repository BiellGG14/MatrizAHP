<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle for icon -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#f0f9f8" stroke-width="2"/>

  <!-- Airplane (top) -->
  <g transform="translate(100, 60)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="8" ry="16" fill="#0d9488" opacity="0.8"/>
    <!-- Wings -->
    <path d="M -20 0 Q 0 8 20 0" stroke="#14b8a6" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Tail wing -->
    <path d="M -12 10 Q 0 14 12 10" stroke="#0d9488" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Circular paths (motion lines) -->
  <g fill="none" stroke="#14b8a6" stroke-width="3" opacity="0.6">
    <path d="M 65 85 Q 75 70 85 65" stroke-linecap="round"/>
    <path d="M 115 85 Q 105 70 115 65" stroke-linecap="round"/>
    <path d="M 75 115 Q 85 130 100 135" stroke-linecap="round"/>
    <path d="M 125 115 Q 115 130 100 135" stroke-linecap="round"/>
  </g>

  <!-- Bar chart (bottom right) -->
  <g transform="translate(65, 120)">
    <rect x="0" y="20" width="6" height="20" fill="#0d9488"/>
    <rect x="10" y="12" width="6" height="28" fill="#14b8a6"/>
    <rect x="20" y="8" width="6" height="32" fill="#0d9488"/>
    <rect x="30" y="16" width="6" height="24" fill="#14b8a6"/>
    <!-- Base line -->
    <line x1="-2" y1="40" x2="38" y2="40" stroke="#0d9488" stroke-width="1.5"/>
  </g>

  <!-- Trend arrow (upward) -->
  <g transform="translate(125, 125)">
    <line x1="0" y1="15" x2="20" y2="-5" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="20,-5 18,-8 22,-10" fill="#0d9488"/>
  </g>
</svg>